<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/maquetacion FPC/Src/Roles/Admin/css/GestionRoles.css">
    <style>
   
        body {
            background-color: #f2f2f2;
        }

    
        .btn-primary, .btn-warning, .btn-danger, .btn-success {
            background-color: #00008B; /* Azul oscuro */
            border-color: #00008B;
        }

        .btn-primary:hover, .btn-warning:hover, .btn-danger:hover, .btn-success:hover {
            background-color: #00008B; /* Azul más oscuro en hover */
            border-color: #00008B;
        }

        .btn {
            border-radius: 5px;
            border-width: 2px;
        }

   
        table {
            margin-top: 20px;
        }

      
        .table-roles th, .table-roles td {
            text-align: center;
        }

    
        .table-roles {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        <h2 class="text-center mb-4">Gestión de Roles</h2>

  
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalRol">Agregar Rol</button>

        <!-- Tabla de roles -->
        <div class="card">
            <div class="card-body">
                <table class="table table-bordered table-hover table-roles">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre del Rol</th>
                            <th> Asignacion </th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Administrador</td>
                            <td>Juan Pérez</td>
                            <td>
                                <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalRol" onclick="editarRol(1, 'Administrador', 'Juan Pérez')">Editar</button>
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </td>
                        </tr>
                        <tr>
        
                            <td>Cliente</td>
                            <td>Ana Gómez</td>
                            <td>
                                <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalRol" onclick="editarRol(2, 'Cliente', 'Ana Gómez')">Editar</button>
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </td>
                        </tr>
                        <tr>
                   
                            <td>Empleado</td>
                            <td>Mario López</td>
                            <td>
                                <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalRol" onclick="editarRol(3, 'Empleado', 'Mario López')">Editar</button>
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRol" tabindex="-1" aria-labelledby="modalRolLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalRolLabel">Agregar/Editar Rol</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="nombreRol" class="form-label">Nombre del Rol</label>
                            <input type="text" class="form-control" id="nombreRol" placeholder="Ingrese el nombre del rol">
                        </div>

                        <div class="mb-3">
                            <label for="empleadoAsignado" class="form-label">Empleado Asignado</label>
                            <input type="text" class="form-control" id="empleadoAsignado" placeholder="Ingrese el nombre del empleado">
                        </div>

                      
                        <h5>Permisos</h5>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="ver" id="permisoVer">
                                <label class="form-check-label" for="permisoVer">
                                    Ver contenido
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="editar" id="permisoEditar">
                                <label class="form-check-label" for="permisoEditar">
                                    Editar contenido
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="eliminar" id="permisoEliminar">
                                <label class="form-check-label" for="permisoEliminar">
                                    Eliminar contenido
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="administrar" id="permisoAdministrar">
                                <label class="form-check-label" for="permisoAdministrar">
                                    Administrar roles
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        function editarRol(id, nombre, empleado) {
       
            document.getElementById('nombreRol').value = nombre;
            document.getElementById('empleadoAsignado').value = empleado;

          
            if (nombre === "Administrador") {
                document.getElementById('permisoVer').checked = true;
                document.getElementById('permisoEditar').checked = true;
                document.getElementById('permisoEliminar').checked = true;
                document.getElementById('permisoAdministrar').checked = true;
            }
            if (nombre === "Cliente") {
                document.getElementById('permisoVer').checked = true;
                document.getElementById('permisoEditar').checked = false;
                document.getElementById('permisoEliminar').checked = false;
                document.getElementById('permisoAdministrar').checked = false;
            }
            if (nombre === "Empleado") {
                document.getElementById('permisoVer').checked = true;
                document.getElementById('permisoEditar').checked = true;
                document.getElementById('permisoEliminar').checked = false;
                document.getElementById('permisoAdministrar').checked = false;
            }
        }
    </script>
</body>
</html>
